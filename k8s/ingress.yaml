apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: closetx-ingress
  namespace: closet-x
  annotations:
    # Ingress Controller
    kubernetes.io/ingress.class: "nginx"
    
    # SSL/TLS Configuration
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    cert-manager.io/acme-challenge-type: "http01"
    
    # Security Headers
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-protocols: "TLSv1.2 TLSv1.3"
    nginx.ingress.kubernetes.io/ssl-ciphers: "HIGH:!aNULL:!MD5"
    
    # Rate Limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "10"
    
    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://closet-x.com, https://www.closet-x.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization"
    nginx.ingress.kubernetes.io/cors-max-age: "86400"
    
    # Request Size Limits
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    
    # Timeouts
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    
    # Load Balancer
    nginx.ingress.kubernetes.io/load-balance: "ewma"
    
    # Additional Security Headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Permissions-Policy: geolocation=(), microphone=(), camera=()";
      
spec:
  tls:
  - hosts:
    - api.closet-x.com
    - closet-x.com
    - www.closet-x.com
    secretName: closetx-tls-secret
  
  rules:
  # ============================================================================
  # API Routes - api.closet-x.com
  # ============================================================================
  - host: api.closet-x.com
    http:
      paths:
      # User Service Routes
      - path: /api/users
        pathType: Prefix
        backend:
          service:
            name: user-service
            port:
              number: 3001
      
      - path: /api/auth
        pathType: Prefix
        backend:
          service:
            name: user-service
            port:
              number: 3001
      
      # Outfit Service Routes
      - path: /api/outfits
        pathType: Prefix
        backend:
          service:
            name: outfit-service
            port:
              number: 3002
      
      - path: /api/clothes
        pathType: Prefix
        backend:
          service:
            name: outfit-service
            port:
              number: 3002
      
      - path: /api/analytics
        pathType: Prefix
        backend:
          service:
            name: outfit-service
            port:
              number: 3002
      
      - path: /api/ai
        pathType: Prefix
        backend:
          service:
            name: outfit-service
            port:
              number: 3002
      
      # Wardrobe Service Routes (future)
      - path: /api/wardrobe
        pathType: Prefix
        backend:
          service:
            name: wardrobe-service
            port:
              number: 3003
      
      # Health Check Routes
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: outfit-service
            port:
              number: 3002
  
  # ============================================================================
  # Frontend Routes - closet-x.com
  # ============================================================================
  - host: closet-x.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
  
  # ============================================================================
  # Frontend Routes - www.closet-x.com
  # ============================================================================
  - host: www.closet-x.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80

---
# ============================================================================
# Certificate Issuer (Let's Encrypt Production)
# ============================================================================
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  namespace: cert-manager
spec:
  acme:
    # Production Let's Encrypt server
    server: https://acme-v02.api.letsencrypt.org/directory
    
    # Email for certificate expiration notifications
    email: admin@closet-x.com
    
    # Private key secret
    privateKeySecretRef:
      name: letsencrypt-prod-private-key
    
    # HTTP-01 challenge solver
    solvers:
    - http01:
        ingress:
          class: nginx

---
# ============================================================================
# Certificate Issuer (Let's Encrypt Staging - for testing)
# ============================================================================
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  namespace: cert-manager
spec:
  acme:
    # Staging Let's Encrypt server (use for testing)
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    
    email: admin@closet-x.com
    
    privateKeySecretRef:
      name: letsencrypt-staging-private-key
    
    solvers:
    - http01:
        ingress:
          class: nginx

---
# ============================================================================
# Network Policy for Ingress
# ============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-services
  namespace: closet-x
spec:
  podSelector:
    matchLabels:
      component: backend
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 3001
    - protocol: TCP
      port: 3002
    - protocol: TCP
      port: 3003

---
# ============================================================================
# Ingress Rate Limiting ConfigMap
# ============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-ingress-rate-limit
  namespace: ingress-nginx
data:
  # Rate limit by IP
  limit-req-zone: "$binary_remote_addr zone=ip_limit:10m rate=10r/s"
  
  # Rate limit by user (JWT token)
  limit-req-zone-user: "$http_authorization zone=user_limit:10m rate=20r/s"
  
  # Connection limit
  limit-conn-zone: "$binary_remote_addr zone=addr:10m"
  limit-conn: "addr 10"
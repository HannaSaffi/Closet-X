# k8s/services/user-service/secret.yaml

apiVersion: v1
kind: Secret
metadata:
  name: user-service-secrets
  namespace: closet-x
  labels:
    app: user-service
type: Opaque
stringData:
  # JWT Secret - CHANGE THIS IN PRODUCTION
  jwt-secret: "your-super-secret-jwt-key-change-in-production-min-32-chars"
  jwt-refresh-secret: "your-super-secret-refresh-key-change-in-production-min-32-chars"
  
  # OAuth Secrets - CHANGE THESE IN PRODUCTION
  google-client-id: "your-google-client-id"
  google-client-secret: "your-google-client-secret"
  facebook-app-id: "your-facebook-app-id"
  facebook-app-secret: "your-facebook-app-secret"
  
  # Email service (SendGrid/Mailgun) - CHANGE THESE
  email-api-key: "your-email-service-api-key"
  email-from: "noreply@closet-x.com"
  
  # Encryption keys
  data-encryption-key: "your-32-char-encryption-key-here"

---
# MongoDB Secrets (shared across services)
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secrets
  namespace: closet-x
type: Opaque
stringData:
  username: "closetx_admin"
  password: "your-mongodb-password-change-in-production"
  root-password: "your-mongodb-root-password"

---
# Harbor Registry Secret (for pulling private images)
apiVersion: v1
kind: Secret
metadata:
  name: harbor-registry-secret
  namespace: closet-x
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "harbor.yourdomain.com": {
          "username": "robot$closet-x",
          "password": "your-harbor-robot-token",
          "auth": "base64-encoded-username:password"
        }
      }
    }
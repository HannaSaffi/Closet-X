# k8s/services/wardrobe-service/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kates-wardrobe-service
  namespace: kates-webapp
  labels:
    app: kates-wardrobe-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kates-wardrobe-service
  template:
    metadata:
      labels:
        app: kates-wardrobe-service
        tier: backend
    spec:
      containers:
      - name: wardrobe-service
        image: your-registry/kates-wardrobe-service:latest
        ports:
        - containerPort: 3004
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3004"
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: kates-mongodb-secret
              key: connection-string
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3004
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3004
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: uploads
          mountPath: /app/uploads
      volumes:
      - name: uploads
        persistentVolumeClaim:
          claimName: kates-wardrobe-uploads-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: kates-wardrobe-service
  namespace: kates-webapp
  labels:
    app: kates-wardrobe-service
spec:
  type: ClusterIP
  ports:
  - port: 3004
    targetPort: 3004
    protocol: TCP
    name: http
  selector:
    app: kates-wardrobe-service
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kates-wardrobe-uploads-pvc
  namespace: kates-webapp
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kates-wardrobe-service-hpa
  namespace: kates-webapp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kates-wardrobe-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
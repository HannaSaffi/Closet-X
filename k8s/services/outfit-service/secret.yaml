# k8s/services/outfit-service/secret.yaml

apiVersion: v1
kind: Secret
metadata:
  name: outfit-service-secrets
  namespace: closet-x
  labels:
    app: outfit-service
type: Opaque
stringData:
  # Weather API Keys - CHANGE IN PRODUCTION
  openweather-api-key: "your-openweather-api-key"
  weatherstack-api-key: "your-weatherstack-api-key-backup"
  
  # AI Vision API Keys - CHANGE IN PRODUCTION
  google-vision-api-key: "your-google-vision-api-key"
  clarifai-api-key: "your-clarifai-api-key"
  
  # Fashion API Keys
  pinterest-api-key: "your-pinterest-api-key"
  
  # RabbitMQ Credentials
  rabbitmq-username: "closetx_outfit"
  rabbitmq-password: "your-rabbitmq-password-change-in-production"
  
  # AI Model Keys (if using custom models)
  custom-model-api-key: "your-custom-ai-model-key"
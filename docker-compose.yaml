# docker-compose.yml - Local development setup

services:
  mongodb:
    image: mongo:latest
    container_name: closetx-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
      - ./infrastructure/scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    environment:
      - MONGO_INITDB_ROOT_USERNAME=closetxuser
      - MONGO_INITDB_ROOT_PASSWORD=supersecurepassword
    networks:
      - closetx-network


  rabbitmq:
    image: rabbitmq:3-management
    container_name: closetx-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    networks:
      - closetx-network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build: ./services/user-service
    container_name: closetx-user-service
    ports:
      - "3001:3001"
    environment:
      - MONGO_URI=mongodb://user_service:service_password_123@mongodb:27017/closetx_users
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - closetx-network

  wardrobe-service:
    build: ./services/wardrobe-service
    container_name: closetx-wardrobe-service
    ports:
      - "3002:3002"
    environment:
      - MONGO_URI=mongodb://wardrobe_service:service_password_123@mongodb:27017/closetx_wardrobe
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - PORT=3002
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - closetx-network
    volumes:
      - wardrobe-uploads:/app/uploads

  outfit-service:
    build: ./services/outfit-service
    container_name: closetx-outfit-service
    ports:
      - "3003:3003"
    environment:
      - RABBITMQ_URL=amqp://guest:guest@closetx-rabbitmq:5672
      - MONGO_URI=mongodb://outfit_service:service_password_123@mongodb:27017/closetx_outfits
      - PORT=3003
      - CLARIFAI_PAT=${CLARIFAI_PAT}
      - CLARIFAI_USER_ID=${CLARIFAI_USER_ID}
      - CLARIFAI_APP_ID=${CLARIFAI_APP_ID}
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - closetx-network

  image-processor:
    build:
      context: .
      dockerfile: workers/image-processor/Dockerfile
    container_name: closetx-image-processor
    environment:
      - MONGO_URI=mongodb://mongodb:27017/closetx
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - closetx-network


networks:
  closetx-network:
    driver: bridge

volumes:
  mongodb-data:
  wardrobe-uploads:
name: CI/CD Pipeline - Closet-X

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  HOMELAB_HARBOR: harbor.javajon.duckdns.org
  GKE_HARBOR: harbor.javajon-gke.duckdns.org
  HARBOR_PROJECT: library
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'
  # Choose cluster: homelab or gke
  TARGET_CLUSTER: homelab

jobs:
  # ============================================================================
  # TESTING JOBS
  # ============================================================================
  
  test-user-service:
    name: Test User Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install dependencies
        working-directory: services/user-service
        run: npm ci
      
      - name: Run tests
        working-directory: services/user-service
        run: npm test
  
  test-wardrobe-service:
    name: Test Wardrobe Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install dependencies
        working-directory: services/wardrobe-service
        run: npm ci
      
      - name: Run tests
        working-directory: services/wardrobe-service
        run: npm test
  
  test-outfit-service:
    name: Test Outfit Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install dependencies
        working-directory: services/outfit-service
        run: npm ci
      
      - name: Run tests
        working-directory: services/outfit-service
        run: npm test
  
  test-ai-service:
    name: Test AI Advice Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        working-directory: services/ai-advice-service
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio
      
      - name: Run tests
        working-directory: services/ai-advice-service
        run: pytest --cov=app --cov-report=xml

  test-image-processor:
    name: Test Image Processor Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install dependencies
        working-directory: workers/image-processor
        run: npm ci
      
      - name: Run tests
        working-directory: workers/image-processor
        run: npm test

  test-outfit-generator:
    name: Test Outfit Generator Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install dependencies
        working-directory: workers/outfit-generator
        run: npm ci
      
      - name: Run tests
        working-directory: workers/outfit-generator
        run: npm test

  test-fashion-advice:
    name: Test Fashion Advice Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install dependencies
        working-directory: workers/fashion-advice
        run: npm ci
      
      - name: Run tests
        working-directory: workers/fashion-advice
        run: npm test

  # ============================================================================
  # BUILD AND PUSH DOCKER IMAGES
  # ============================================================================
  
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-user-service, test-wardrobe-service, test-outfit-service, test-ai-service, test-image-processor, test-outfit-generator, test-fashion-advice]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    strategy:
      matrix:
        include:
          - service: user-service
            path: services/user-service
            dockerfile: Dockerfile
          - service: wardrobe-service
            path: services/wardrobe-service
            dockerfile: Dockerfile
          - service: outfit-service
            path: services/outfit-service
            dockerfile: Dockerfile
          - service: ai-advice-service
            path: services/ai-advice-service
            dockerfile: Dockerfile
          - service: image-processor
            path: workers/image-processor
            dockerfile: Dockerfile
          - service: outfit-generator
            path: workers/outfit-generator
            dockerfile: Dockerfile
          - service: fashion-advice
            path: workers/fashion-advice
            dockerfile: Dockerfile
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Homelab Harbor Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.HOMELAB_HARBOR }}
          username: ${{ secrets.HOMELAB_HARBOR_USERNAME }}
          password: ${{ secrets.HOMELAB_HARBOR_PASSWORD }}
      
      - name: Log in to GKE Harbor Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.GKE_HARBOR }}
          username: ${{ secrets.GKE_HARBOR_USERNAME }}
          password: ${{ secrets.GKE_HARBOR_PASSWORD }}
      
      - name: Extract metadata for Homelab
        id: meta-homelab
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.HOMELAB_HARBOR }}/${{ env.HARBOR_PROJECT }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=v1.0.0
      
      - name: Extract metadata for GKE
        id: meta-gke
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.GKE_HARBOR }}/${{ env.HARBOR_PROJECT }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=v1.0.0
      
      - name: Build and push to Homelab Harbor
        uses: docker/build-push-action@v4
        with:
          context: ${{ matrix.path }}
          file: ${{ matrix.path }}/${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta-homelab.outputs.tags }}
          labels: ${{ steps.meta-homelab.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and push to GKE Harbor
        uses: docker/build-push-action@v4
        with:
          context: ${{ matrix.path }}
          file: ${{ matrix.path }}/${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta-gke.outputs.tags }}
          labels: ${{ steps.meta-gke.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # DEPLOY TO KUBERNETES
  # ============================================================================
  
  deploy-to-kubernetes:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'
      
      - name: Configure kubectl for Homelab
        if: env.TARGET_CLUSTER == 'homelab'
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.HOMELAB_KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
          kubectl config use-context admin@homelab-k8s-1
      
      - name: Configure kubectl for GKE
        if: env.TARGET_CLUSTER == 'gke'
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.GKE_KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
          kubectl config use-context gke_horizontal-ray-375222_us-central1_autopilot-cluster-2
      
      - name: Verify cluster connection
        run: |
          kubectl cluster-info
          kubectl get nodes
      
      - name: Deploy to Kubernetes
        run: |
          echo "🚀 Deploying Closet-X to ${{ env.TARGET_CLUSTER }} cluster..."
          
          MANIFESTS_DIR="k8s/${{ env.TARGET_CLUSTER }}"
          
          # Apply namespace and configs
          kubectl apply -f $MANIFESTS_DIR/00-namespace.yaml
          kubectl apply -f $MANIFESTS_DIR/01-imagepullsecret.yaml
          kubectl apply -f $MANIFESTS_DIR/02-config-secrets.yaml
          
          # Deploy MongoDB
          kubectl apply -f $MANIFESTS_DIR/03-mongodb.yaml
          
          # Wait for MongoDB
          echo "⏳ Waiting for MongoDB..."
          kubectl wait --for=condition=ready pod -l app=mongodb -n kates-closetx --timeout=300s || true
          sleep 10
          
          # Deploy services
          kubectl apply -f $MANIFESTS_DIR/04-user-service.yaml
          kubectl apply -f $MANIFESTS_DIR/05-wardrobe-service.yaml
          kubectl apply -f $MANIFESTS_DIR/06-outfit-service.yaml
          kubectl apply -f $MANIFESTS_DIR/07-advice-service.yaml
          
          # Deploy workers
          kubectl apply -f $MANIFESTS_DIR/08-image-processor.yaml
          kubectl apply -f $MANIFESTS_DIR/09-outfit-generator.yaml
          kubectl apply -f $MANIFESTS_DIR/10-fashion-advice.yaml
          
          # Deploy ingress
          kubectl apply -f $MANIFESTS_DIR/11-ingress.yaml
          
          # Deploy HPA (auto-scaling)
          kubectl apply -f $MANIFESTS_DIR/12-hpa.yaml
          
          echo "✅ Deployment complete!"
      
      - name: Wait for deployments
        run: |
          echo "⏳ Waiting for deployments to be ready..."
          kubectl wait --for=condition=available --timeout=300s \
            deployment/user-service \
            deployment/wardrobe-service \
            deployment/outfit-service \
            deployment/ai-advice-service \
            -n kates-closetx || true
      
      - name: Verify deployment
        run: |
          echo "📊 Deployment status:"
          kubectl get all -n kates-closetx
          
          echo ""
          echo "📦 Pods:"
          kubectl get pods -n kates-closetx -o wide
          
          echo ""
          echo "🌐 Services:"
          kubectl get svc -n kates-closetx
          
          echo ""
          echo "🔀 Ingress:"
          kubectl get ingress -n kates-closetx
          
          echo ""
          echo "📊 HPA Status:"
          kubectl get hpa -n kates-closetx
          
          echo ""
          echo "🔍 Checking pod health..."
          FAILED_PODS=$(kubectl get pods -n kates-closetx --field-selector=status.phase!=Running --no-headers 2>/dev/null | wc -l)
          if [ "$FAILED_PODS" -gt "0" ]; then
            echo "⚠️ Warning: $FAILED_PODS pod(s) not in Running state"
            kubectl get pods -n kates-closetx --field-selector=status.phase!=Running
          else
            echo "✅ All pods are running!"
          fi
      
      - name: Run smoke tests
        run: |
          echo "🧪 Running smoke tests..."
          
          # Wait a bit for services to fully start
          sleep 30
          
          # Test user service health
          kubectl run curl-test --image=curlimages/curl:latest --rm -i --restart=Never -n kates-closetx -- \
            curl -f http://user-service.kates-closetx.svc.cluster.local:3001/health || echo "⚠️ User service health check failed"
          
          # Test wardrobe service health
          kubectl run curl-test --image=curlimages/curl:latest --rm -i --restart=Never -n kates-closetx -- \
            curl -f http://wardrobe-service.kates-closetx.svc.cluster.local:3003/health || echo "⚠️ Wardrobe service health check failed"
          
          echo "✅ Smoke tests complete!"
      
      - name: Deployment summary
        run: |
          echo "🎉 Deployment Summary"
          echo "===================="
          echo "✅ All services deployed to ${{ env.TARGET_CLUSTER }}"
          
          if [ "${{ env.TARGET_CLUSTER }}" == "homelab" ]; then
            echo "🌐 Access at: http://kates-closetx.javajon.duckdns.org"
          else
            echo "🌐 Access at: http://kates-closetx.javajon-gke.duckdns.org"
          fi
          
          echo ""
          echo "Services:"
          echo "  - User Service (Auth)"
          echo "  - Wardrobe Service (Clothing)"
          echo "  - Outfit Service (Outfit Generation)"
          echo "  - AI Advice Service (Fashion AI)"
          echo ""
          echo "Workers:"
          echo "  - Image Processor"
          echo "  - Outfit Generator"
          echo "  - Fashion Advice"
          echo ""
          echo "Database:"
          echo "  - MongoDB StatefulSet"

  # ============================================================================
  # NOTIFICATION JOB
  # ============================================================================
  
  notify-success:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: [deploy-to-kubernetes]
    if: success()
    steps:
      - name: Success message
        run: |
          echo "🎉 CI/CD Pipeline Completed Successfully!"
          echo "✅ All tests passed"
          echo "✅ Docker images built and pushed"
          echo "✅ Deployed to Kubernetes"
          echo "🌐 Application available at: http://kates-closetx.javajon.duckdns.org"
  
  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: [test-user-service, test-wardrobe-service, test-outfit-service, test-ai-service, test-image-processor, test-outfit-generator, test-fashion-advice, build-and-push, deploy-to-kubernetes]
    if: failure()
    steps:
      - name: Failure message
        run: |
          echo "❌ CI/CD Pipeline Failed"
          echo "Please check the logs above for details"
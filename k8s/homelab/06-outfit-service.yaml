#k8s/homelab/06-outfit-service.yaml
# Outfit Service Deployment with Gemini AI Integration
# Fixed: Uses secret reference for API keys instead of hardcoded values

apiVersion: apps/v1
kind: Deployment
metadata:
  name: outfit-service
  namespace: kates-closetx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: outfit-service
  template:
    metadata:
      labels:
        app: outfit-service
    spec:
      containers:
      - name: outfit-service
        image: harbor.javajon.duckdns.org/library/outfit-service:v8.0.8
        ports:
        - containerPort: 3002
        env:
        # Service Configuration
        - name: PORT
          value: "3002"
        - name: NODE_ENV
          value: "production"
        
        # Database Connection
        - name: MONGO_URI
          value: "mongodb://outfit_service:service_password_123@mongodb-service.kates-closetx.svc.cluster.local:27017/closetx_outfits?authSource=admin"
        
        # Message Queue
        - name: RABBITMQ_URL
          value: "amqp://admin:admin@rabbitmq.rabbitmq.svc.cluster.local:5672"
        
        # JWT Authentication (from secret)
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: closetx-secrets
              key: JWT_SECRET
        
        # Service URLs (from configmap)
        - name: WARDROBE_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: closetx-config
              key: WARDROBE_SERVICE_URL
        
        - name: AI_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: closetx-config
              key: AI_SERVICE_URL
        
        # External API Keys (from secret)
        - name: OPENWEATHER_API_KEY
          valueFrom:
            secretKeyRef:
              name: closetx-secrets
              key: OPENWEATHER_API_KEY
        
        # AI Provider API Keys (from secret)
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: closetx-secrets
              key: GEMINI_API_KEY
        
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: closetx-secrets
              key: OPENAI_API_KEY
        
        # Ollama Configuration (for future use)
        - name: OLLAMA_URL
          value: "http://ollama-service:11434"
        
        # Resource Management
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        
        # Health Checks
        livenessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: outfit-service
  namespace: kates-closetx
spec:
  selector:
    app: outfit-service
  ports:
  - port: 3002
    targetPort: 3002
    protocol: TCP
  type: ClusterIP
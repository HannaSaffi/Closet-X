apiVersion: apps/v1
kind: Deployment
metadata:
  name: outfit-generator
  namespace: kates-closetx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: outfit-generator
  template:
    metadata:
      labels:
        app: outfit-generator
    spec:
      containers:
      - name: outfit-generator
        image: harbor.javajon.duckdns.org/kates/outfit-generator:v1.0.0
        env:
        - name: NODE_ENV
          value: "production"
        - name: MONGO_URI
          value: "mongodb://outfit_service:service_password_123@mongodb-service.kates-closetx.svc.cluster.local:27017/closetx_outfits?authSource=admin"
        - name: RABBITMQ_URL
          value: "amqp://admin:admin@rabbitmq.rabbitmq.svc.cluster.local:5672"
        - name: WARDROBE_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: closetx-config
              key: WARDROBE_SERVICE_URL
        - name: OUTFIT_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: closetx-config
              key: OUTFIT_SERVICE_URL
        - name: OPENWEATHER_API_KEY
          valueFrom:
            secretKeyRef:
              name: closetx-secrets
              key: OPENWEATHER_API_KEY
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          exec:
            command:
            - node
            - -e
            - "process.exit(0)"
          initialDelaySeconds: 30
          periodSeconds: 30
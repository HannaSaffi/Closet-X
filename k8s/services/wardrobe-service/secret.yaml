# services/wardrobe-service/k8s/secret.yaml

apiVersion: v1
kind: Secret
metadata:
  name: wardrobe-service-secrets
  namespace: closet-x
  labels:
    app: wardrobe-service
type: Opaque
stringData:
  # AWS S3 Credentials - CHANGE THESE IN PRODUCTION
  aws-access-key-id: "your-aws-access-key-id"
  aws-secret-access-key: "your-aws-secret-access-key"
  
  # RabbitMQ Credentials
  rabbitmq-username: "closetx_wardrobe"
  rabbitmq-password: "your-rabbitmq-password-change-in-production"
  
  # API Keys for external services
  clarifai-api-key: "your-clarifai-api-key"
  
  # Image encryption key (for sensitive images)
  image-encryption-key: "your-32-char-image-encryption-key"
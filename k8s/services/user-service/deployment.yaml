# UPDATED DEPLOYMENT FILES FOR HARBOR REGISTRY
# Replace the image URLs and imagePullSecrets in ALL your deployment files

# ============================================
# User Service Deployment (UPDATED)
# services/user-service/k8s/deployment.yaml
# ============================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: closet-x
  labels:
    app: user-service
    tier: backend
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: user-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: user-service
        tier: backend
        version: v1
    spec:
      containers:
      - name: user-service
        # UPDATED: Use YOUR actual Harbor URL
        image: harbor.yourdomain.com/closet-x/user-service:latest
        imagePullPolicy: Always
        
        ports:
        - name: http
          containerPort: 3001
          protocol: TCP
        
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3001"
        - name: MONGODB_URI
          valueFrom:
            configMapKeyRef:
              name: user-service-config
              key: mongodb-uri
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: user-service-secrets
              key: jwt-secret
        - name: MONGODB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-secrets
              key: password
        
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
      
      # UPDATED: Use the secret name from kates-imagepullsecret.yaml
      imagePullSecrets:
      - name: kates-harbor-secret


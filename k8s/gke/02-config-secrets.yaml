apiVersion: v1
kind: ConfigMap
metadata:
  name: closetx-config
  namespace: kates-closetx
data:
  RABBITMQ_URL: "amqp://guest:guest@rabbitmq.rabbitmq.svc.cluster.local:5672"
  RABBITMQ_USER: "admin"
  
  # Service URLs
  USER_SERVICE_URL: "http://user-service.kates-closetx.svc.cluster.local:3001"
  WARDROBE_SERVICE_URL: "http://wardrobe-service.kates-closetx.svc.cluster.local:3003"
  OUTFIT_SERVICE_URL: "http://outfit-service.kates-closetx.svc.cluster.local:3002"
  AI_SERVICE_URL: "http://ai-advice-service.kates-closetx.svc.cluster.local:3004"
  
  # MongoDB connection
  MONGODB_HOST: "mongodb-service.kates-closetx.svc.cluster.local"
  
  # JWT
  JWT_EXPIRE: "7d"
  JWT_EXPIRATION: "7d"
  
  # Environment
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  WEATHER_PROVIDER: "openweather"

---
apiVersion: v1
kind: Secret
metadata:
  name: closetx-secrets
  namespace: kates-closetx
type: Opaque
stringData:
  # MongoDB credentials
  MONGODB_ROOT_USERNAME: "closetxuser"
  MONGODB_ROOT_PASSWORD: "supersecurepassword123"
  
  # ADD THESE THREE LINES:
  USER_SERVICE_MONGODB_URI: "mongodb://user_service:service_password_123@mongodb-service.kates-closetx.svc.cluster.local:27017/closetx_users?authSource=admin"
  WARDROBE_SERVICE_MONGODB_URI: "mongodb://wardrobe_service:service_password_123@mongodb-service.kates-closetx.svc.cluster.local:27017/closetx_wardrobe?authSource=admin"
  OUTFIT_SERVICE_MONGODB_URI: "mongodb://outfit_service:service_password_123@mongodb-service.kates-closetx.svc.cluster.local:27017/closetx_outfits?authSource=admin"
  
  # RabbitMQ password
  RABBITMQ_PASS: "admin"
  
  # JWT Secret
  JWT_SECRET: "closetx-super-secret-production-key-change-me-12345678"
  
  # API Keys (keep existing ones)
  OPENWEATHER_API_KEY: "75b4246ff3ecccbef11f5cdc6ed5341f"

# services/wardrobe-service/k8s/pvc.yaml

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wardrobe-uploads-pvc
  namespace: closet-x
  labels:
    app: wardrobe-service
spec:
  accessModes:
    - ReadWriteMany  # Multiple pods can read/write
  storageClassName: nfs-client  # Change based on your storage class
  resources:
    requests:
      storage: 50Gi  # 50GB for temporary uploads before S3
  volumeMode: Filesystem
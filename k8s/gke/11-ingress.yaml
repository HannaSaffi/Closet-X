#k8s/gke/11-ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: closetx-ingress
  namespace: kates-closetx
  annotations:
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
  - host: kates-closetx.javajon-gke.duckdns.org
    http:
      paths:
      - path: /api/auth
        pathType: Prefix
        backend:
          service:
            name: user-service
            port:
              number: 3001
      - path: /api/wardrobe
        pathType: Prefix
        backend:
          service:
            name: wardrobe-service
            port:
              number: 3003
      - path: /api/daily-outfit
        pathType: Prefix
        backend:
          service:
            name: outfit-service
            port:
              number: 3002
      - path: /api/outfits
        pathType: Prefix
        backend:
          service:
            name: outfit-service
            port:
              number: 3002
      - path: /api/ai
        pathType: Prefix
        backend:
          service:
            name: ai-advice-service
            port:
              number: 3004
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: user-service
            port:
              number: 3001
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
#k8s/gke/05-wardrobe-service.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wardrobe-service
  namespace: kates-closetx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wardrobe-service
  template:
    metadata:
      labels:
        app: wardrobe-service
    spec:
      containers:
      - name: wardrobe-service
        image: harbor.javajon-gke.duckdns.org/library/wardrobe-service:v8.0.8
        ports:
        - containerPort: 3003
        env:
        - name: PORT
          value: "3003"
        - name: NODE_ENV
          value: "production"
        - name: MONGO_URI
          value: "mongodb://wardrobe_service:service_password_123@mongodb-service.kates-closetx.svc.cluster.local:27017/closetx_wardrobe?authSource=admin"
        - name: RABBITMQ_URL
          value: "amqp://admin:admin@rabbitmq.rabbitmq:5672"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: closetx-secrets
              key: JWT_SECRET
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: wardrobe-service
  namespace: kates-closetx
spec:
  selector:
    app: wardrobe-service
  ports:
  - port: 3003
    targetPort: 3003
  type: ClusterIP
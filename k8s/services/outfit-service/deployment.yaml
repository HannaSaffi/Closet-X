# k8s/services/outfit-service/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: outfit-service
  namespace: closet-x
  labels:
    app: outfit-service
    component: backend
    tier: service
spec:
  replicas: 3
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: outfit-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: outfit-service
        component: backend
        tier: service
        version: v1.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3002"
        prometheus.io/path: "/metrics"
    spec:
      # Security Context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      # Service Account
      serviceAccountName: outfit-service-sa
      
      containers:
      - name: outfit-service
        image: closetx/outfit-service:latest
        imagePullPolicy: Always
        
        ports:
        - name: http
          containerPort: 3002
          protocol: TCP
        
        # Environment Variables
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3002"
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: outfit-service-secrets
              key: mongodb-uri
        - name: RABBITMQ_URL
          valueFrom:
            configMapKeyRef:
              name: outfit-service-config
              key: rabbitmq-url
        - name: GOOGLE_VISION_API_KEY
          valueFrom:
            secretKeyRef:
              name: outfit-service-secrets
              key: google-vision-api-key
        - name: CLARIFAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: outfit-service-secrets
              key: clarifai-api-key
        - name: WEATHER_API_KEY
          valueFrom:
            secretKeyRef:
              name: outfit-service-secrets
              key: weather-api-key
        - name: OLLAMA_HOST
          valueFrom:
            configMapKeyRef:
              name: outfit-service-config
              key: ollama-host
        - name: CACHE_TTL
          valueFrom:
            configMapKeyRef:
              name: outfit-service-config
              key: cache-ttl
        
        # Resource Limits (Higher for AI processing)
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
            ephemeral-storage: "1Gi"
          limits:
            memory: "1Gi"
            cpu: "1000m"
            ephemeral-storage: "2Gi"
        
        # Health Checks
        livenessProbe:
          httpGet:
            path: /live
            port: http
            scheme: HTTP
          initialDelaySeconds: 45
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /ready
            port: http
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        
        startupProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 30
        
        # Lifecycle Hooks
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]
        
        # Volume Mounts for cache
        volumeMounts:
        - name: cache-volume
          mountPath: /app/cache
        
        # Security Context
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
              - ALL
      
      # Volumes
      volumes:
      - name: cache-volume
        emptyDir:
          sizeLimit: 500Mi
      
      # Init Containers
      initContainers:
      - name: wait-for-mongodb
        image: busybox:1.35
        command: ['sh', '-c', 'until nc -z closetx-mongodb 27017; do echo "Waiting for MongoDB..."; sleep 2; done;']
      
      - name: wait-for-rabbitmq
        image: busybox:1.35
        command: ['sh', '-c', 'until nc -z closetx-rabbitmq 5672; do echo "Waiting for RabbitMQ..."; sleep 2; done;']
      
      # Pod Scheduling
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - outfit-service
              topologyKey: kubernetes.io/hostname
      
      # Tolerations
      tolerations:
      - key: "node.kubernetes.io/not-ready"
        operator: "Exists"
        effect: "NoExecute"
        tolerationSeconds: 300
      - key: "node.kubernetes.io/unreachable"
        operator: "Exists"
        effect: "NoExecute"
        tolerationSeconds: 300
      
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: outfit-service-sa
  namespace: closet-x
  labels:
    app: outfit-service

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: outfit-service-pdb
  namespace: closet-x
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: outfit-service
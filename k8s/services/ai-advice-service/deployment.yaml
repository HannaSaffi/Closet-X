apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-advice-service
  namespace: kates-services
  labels:
    app: ai-advice-service
    component: backend
    tier: service
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: ai-advice-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ai-advice-service
        component: backend
        tier: service
        version: v1.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3004"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      serviceAccountName: default
      
      containers:
      - name: ai-advice-service
        image: harbor.javajon.duckdns.org/kates/closetx-ai-advice-service:1.0.0
        imagePullPolicy: Always
        
        ports:
        - name: http
          containerPort: 3004
          protocol: TCP
        
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3004"
        
        # Gemini API Key (Free tier available)
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-advice-secrets
              key: gemini-api-key
              optional: true
        
        # OpenAI API Key (Backup)
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-advice-secrets
              key: openai-api-key
              optional: true
        
        # Preferred provider (gemini or openai)
        - name: AI_PROVIDER
          valueFrom:
            configMapKeyRef:
              name: ai-advice-config
              key: preferred-provider
        
        # Resource Limits
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
            ephemeral-storage: "512Mi"
          limits:
            memory: "512Mi"
            cpu: "500m"
            ephemeral-storage: "1Gi"
        
        # Health Checks
        livenessProbe:
          httpGet:
            path: /live
            port: http
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /ready
            port: http
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        
        startupProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 30
        
        # Lifecycle Hooks
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]
        
        # Security Context
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
              - ALL
      
      # Image Pull Secrets
      imagePullSecrets:
      - name: harbor-pull-secret
      
      # Pod Scheduling
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - ai-advice-service
              topologyKey: kubernetes.io/hostname
      
      # Tolerations
      tolerations:
      - key: "node.kubernetes.io/not-ready"
        operator: "Exists"
        effect: "NoExecute"
        tolerationSeconds: 300
      - key: "node.kubernetes.io/unreachable"
        operator: "Exists"
        effect: "NoExecute"
        tolerationSeconds: 300
      
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: ai-advice-service
  namespace: kates-services
  labels:
    app: ai-advice-service
spec:
  selector:
    app: ai-advice-service
  ports:
  - port: 3004
    targetPort: 3004
    protocol: TCP
    name: http
  type: ClusterIP

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ai-advice-service-pdb
  namespace: kates-services
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: ai-advice-service
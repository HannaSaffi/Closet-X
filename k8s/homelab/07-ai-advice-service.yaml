#k8s/07-advice-service.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-advice-service
  namespace: kates-closetx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-advice-service
  template:
    metadata:
      labels:
        app: ai-advice-service
    spec:
      containers:
      - name: ai-advice-service
        image: harbor.javajon.duckdns.org/library/ai-advice-service:v1.0.0
        ports:
        - containerPort: 3004
        env:
        - name: PORT
          value: "3004"
        - name: MONGODB_URI
          value: "mongodb://ai_service:service_password_123@mongodb-service.kates-closetx.svc.cluster.local:27017/closetx_ai?authSource=admin"
        - name: RABBITMQ_URL
          value: "amqp://admin:admin@rabbitmq.rabbitmq.svc.cluster.local:5672"
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: closetx-secrets
              key: OPENAI_API_KEY
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: closetx-secrets
              key: GEMINI_API_KEY
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-advice-service
  namespace: kates-closetx
spec:
  selector:
    app: ai-advice-service
  ports:
  - port: 3004
    targetPort: 3004
  type: ClusterIP

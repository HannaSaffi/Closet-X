apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: closetx-ingress
  namespace: kates-closetx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
spec:
  ingressClassName: nginx
  rules:
  - host: kates-closetx.javajon.duckdns.org
    http:
      paths:
      # User Service - Authentication
      - path: /api/auth
        pathType: Prefix
        backend:
          service:
            name: user-service
            port:
              number: 3001
      
      # Wardrobe Service - Clothing management
      - path: /api/wardrobe
        pathType: Prefix
        backend:
          service:
            name: wardrobe-service
            port:
              number: 3003
      
      # Outfit Service - Outfit generation
      - path: /api/outfits
        pathType: Prefix
        backend:
          service:
            name: outfit-service
            port:
              number: 3002
      
      # AI Service - Fashion advice
      - path: /api/ai
        pathType: Prefix
        backend:
          service:
            name: ai-advice-service
            port:
              number: 3004
      
      # Health checks 
      - path: /health/user
        pathType: Exact
        backend:
          service:
            name: user-service
            port:
              number: 3001
      
      - path: /health/wardrobe
        pathType: Exact
        backend:
          service:
            name: wardrobe-service
            port:
              number: 3003
      
      - path: /health/outfit
        pathType: Exact
        backend:
          service:
            name: outfit-service
            port:
              number: 3002
      
      - path: /health/ai
        pathType: Exact
        backend:
          service:
            name: ai-advice-service
            port:
              number: 3004
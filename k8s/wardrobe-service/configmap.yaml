# services/wardrobe-service/k8s/configmap.yaml

apiVersion: v1
kind: ConfigMap
metadata:
  name: wardrobe-service-config
  namespace: closet-x
  labels:
    app: wardrobe-service
data:
  # Database configuration
  mongodb-uri: "mongodb://mongodb-service:27017/closetx_wardrobe"
  mongodb-pool-size: "10"
  
  # AWS S3 configuration
  s3-bucket: "closet-x-images"
  aws-region: "us-east-1"
  s3-folder-structure: "users/{userId}/clothing/{clothingId}"
  
  # Image processing configuration
  max-file-size: "10485760"  # 10MB in bytes
  allowed-file-types: "image/jpeg,image/png,image/webp,image/jpg"
  thumbnail-width: "300"
  thumbnail-height: "300"
  thumbnail-quality: "80"
  
  # RabbitMQ configuration
  rabbitmq-url: "amqp://rabbitmq-service:5672"
  rabbitmq-exchange: "clothing-events"
  rabbitmq-queue: "image-processing"
  
  # API configuration
  api-rate-limit: "200"
  api-rate-window: "15"
  max-items-per-user: "1000"
  
  # CORS configuration
  cors-origin: "https://closet-x.yourdomain.com"
  
  # Service URLs for inter-service communication
  user-service-url: "http://user-service"
  outfit-service-url: "http://outfit-service"
  
  # Upload configuration
  upload-temp-dir: "/tmp/uploads"
  upload-chunk-size: "1048576"  # 1MB
  
  # Feature flags
  feature-ai-categorization: "true"
  feature-auto-tagging: "true"
  feature-duplicate-detection: "false"
  
  # Logging configuration
  log-level: "info"
  log-format: "json"
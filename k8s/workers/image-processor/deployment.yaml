# workers/image-processor/k8s/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kates-image-processor
  namespace: kates-webapp
  labels:
    app: kates-image-processor
    tier: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kates-image-processor
  template:
    metadata:
      labels:
        app: kates-image-processor
        tier: worker
    spec:
      containers:
      - name: image-processor
        image: your-registry/kates-image-processor:latest
        ports:
        - containerPort: 3002
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3002"
        - name: RABBITMQ_URL
          valueFrom:
            secretKeyRef:
              name: kates-rabbitmq-secret
              key: connection-string
        - name: S3_BUCKET_NAME
          valueFrom:
            secretKeyRef:
              name: kates-s3-secret
              key: bucket-name
              optional: true
        - name: CLARIFAI_PAT
          valueFrom:
            secretKeyRef:
              name: kates-clarifai-secret
              key: pat
              optional: true
        - name: CLARIFAI_USER_ID
          valueFrom:
            secretKeyRef:
              name: kates-clarifai-secret
              key: user-id
              optional: true
        - name: CLARIFAI_APP_ID
          valueFrom:
            secretKeyRef:
              name: kates-clarifai-secret
              key: app-id
              optional: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: uploads
          mountPath: /app/uploads
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: uploads
        persistentVolumeClaim:
          claimName: kates-image-uploads-pvc
      - name: logs
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: kates-image-processor
  namespace: kates-webapp
  labels:
    app: kates-image-processor
spec:
  type: ClusterIP
  ports:
  - port: 3002
    targetPort: 3002
    protocol: TCP
    name: http
  selector:
    app: kates-image-processor
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kates-image-uploads-pvc
  namespace: kates-webapp
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kates-image-processor-hpa
  namespace: kates-webapp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kates-image-processor
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
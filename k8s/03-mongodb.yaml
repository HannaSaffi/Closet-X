apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-init
  namespace: kates-closetx
data:
  mongo-init.js: |
    db = db.getSiblingDB('admin');
    
    db.createUser({
      user: 'user_service',
      pwd: 'service_password_123',
      roles: [{ role: 'readWrite', db: 'closetx_users' }]
    });
    
    db.createUser({
      user: 'wardrobe_service',
      pwd: 'service_password_123',
      roles: [{ role: 'readWrite', db: 'closetx_wardrobe' }]
    });
    
    db.createUser({
      user: 'outfit_service',
      pwd: 'service_password_123',
      roles: [{ role: 'readWrite', db: 'closetx_outfits' }]
    });
    
    db.createUser({
      user: 'ai_service',
      pwd: 'service_password_123',
      roles: [{ role: 'readWrite', db: 'closetx_ai' }]
    });

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: kates-closetx
spec:
  serviceName: mongodb-service
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:7.0
        ports:
        - containerPort: 27017
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: closetx-secrets
              key: MONGODB_ROOT_USERNAME
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: closetx-secrets
              key: MONGODB_ROOT_PASSWORD
        volumeMounts:
        - name: mongodb-data
          mountPath: /data/db
        - name: mongodb-init-script
          mountPath: /docker-entrypoint-initdb.d
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - mongosh
            - --eval
            - "db.adminCommand('ping')"
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: mongodb-init-script
        configMap:
          name: mongodb-init
  volumeClaimTemplates:
  - metadata:
      name: mongodb-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 5Gi

---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  namespace: kates-closetx
spec:
  clusterIP: None
  ports:
  - port: 27017
    targetPort: 27017
  selector:
    app: mongodb

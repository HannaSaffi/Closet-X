# services/outfit-service/k8s/deployment.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: outfit-service
  namespace: closet-x
  labels:
    app: outfit-service
    tier: backend
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: outfit-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: outfit-service
        tier: backend
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3003"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: closet-x-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      
      containers:
      - name: outfit-service
        image: harbor.yourdomain.com/closet-x/outfit-service:latest
        imagePullPolicy: Always
        
        ports:
        - name: http
          containerPort: 3003
          protocol: TCP
        
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3003"
        - name: SERVICE_NAME
          value: "outfit-service"
        
        # ConfigMap references
        - name: MONGODB_URI
          valueFrom:
            configMapKeyRef:
              name: outfit-service-config
              key: mongodb-uri
        - name: RABBITMQ_URL
          valueFrom:
            configMapKeyRef:
              name: outfit-service-config
              key: rabbitmq-url
        - name: USER_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: outfit-service-config
              key: user-service-url
        - name: WARDROBE_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: outfit-service-config
              key: wardrobe-service-url
        - name: WEATHER_API_URL
          valueFrom:
            configMapKeyRef:
              name: outfit-service-config
              key: weather-api-url
        - name: WEATHER_CACHE_TTL
          valueFrom:
            configMapKeyRef:
              name: outfit-service-config
              key: weather-cache-ttl
        
        # Secret references
        - name: MONGODB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-secrets
              key: password
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: user-service-secrets
              key: jwt-secret
        - name: OPENWEATHER_API_KEY
          valueFrom:
            secretKeyRef:
              name: outfit-service-secrets
              key: openweather-api-key
        - name: GOOGLE_VISION_API_KEY
          valueFrom:
            secretKeyRef:
              name: outfit-service-secrets
              key: google-vision-api-key
        - name: CLARIFAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: outfit-service-secrets
              key: clarifai-api-key
        
        # Resource limits and requests
        resources:
          requests:
            memory: "512Mi"
            cpu: "300m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        
        # Liveness probe
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          successThreshold: 1
        
        # Readiness probe
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
          successThreshold: 1
        
        # Startup probe
        startupProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 30
          successThreshold: 1
        
        # Security context
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1001
          capabilities:
            drop:
            - ALL
        
        # Volume mounts
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /app/cache
        - name: logs
          mountPath: /app/logs
      
      # Volumes
      volumes:
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir:
          sizeLimit: 1Gi
      - name: logs
        emptyDir: {}
      
      # Image pull secrets
      imagePullSecrets:
      - name: harbor-registry-secret
      
      # Pod affinity
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - outfit-service
              topologyKey: kubernetes.io/hostname
      
      # Tolerations
      tolerations:
      - key: "node-role"
        operator: "Equal"
        value: "backend"
        effect: "NoSchedule"
# ============================================================================
# Closet-X Docker Compose - Complete Development Environment
# ============================================================================

services:
  # MongoDB
  mongodb:
    image: mongo:7.0
    container_name: closetx-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-closetxuser}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-supersecurepassword}
    volumes:
      - mongodb-data:/data/db
      - ./infrastructure/scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - closetx-network

  # MongoDB Express (UI)
  mongo-express:
    image: mongo-express:latest
    container_name: closetx-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_INITDB_ROOT_USERNAME:-closetxuser}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-supersecurepassword}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-closetxuser}:${MONGO_INITDB_ROOT_PASSWORD:-supersecurepassword}@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - closetx-network

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: closetx-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - closetx-network

  # User Service
  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: closetx-user-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-closetxuser}:${MONGO_INITDB_ROOT_PASSWORD:-supersecurepassword}@mongodb:27017/closetx_users?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-minimum-32-characters-long}
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./services/user-service/src:/app/src:ro
    networks:
      - closetx-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Outfit Service
  outfit-service:
    build:
      context: ./services/outfit-service
      dockerfile: Dockerfile
    container_name: closetx-outfit-service
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3002
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-closetxuser}:${MONGO_INITDB_ROOT_PASSWORD:-supersecurepassword}@mongodb:27017/closetx_outfits?authSource=admin
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-minimum-32-characters-long}
      USER_SERVICE_URL: ${USER_SERVICE_URL:-http://user-service:3001}
      WARDROBE_SERVICE_URL: ${WARDROBE_SERVICE_URL:-http://wardrobe-service:3003}
      OLLAMA_HOST: ${OLLAMA_HOST:-}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
      GOOGLE_VISION_API_KEY: ${GOOGLE_VISION_API_KEY:-}
      REMOVEBG_API_KEY: ${REMOVEBG_API_KEY:-}
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./services/outfit-service/src:/app/src:ro
    networks:
      - closetx-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Wardrobe Service
  wardrobe-service:
    build:
      context: ./services/wardrobe-service
      dockerfile: Dockerfile
    container_name: closetx-wardrobe-service
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3003
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-closetxuser}:${MONGO_INITDB_ROOT_PASSWORD:-supersecurepassword}@mongodb:27017/closetx_wardrobe?authSource=admin
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-minimum-32-characters-long}
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./services/wardrobe-service/src:/app/src:ro
    networks:
      - closetx-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Image Processor Worker
  image-processor:
    build:
      context: ./workers/image-processor
      dockerfile: Dockerfile
    container_name: closetx-image-processor
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-closetxuser}:${MONGO_INITDB_ROOT_PASSWORD:-supersecurepassword}@mongodb:27017/closetx_wardrobe?authSource=admin
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
      WARDROBE_SERVICE_URL: ${WARDROBE_SERVICE_URL:-http://wardrobe-service:3003}
      OLLAMA_HOST: ${OLLAMA_HOST:-}
      GOOGLE_VISION_API_KEY: ${GOOGLE_VISION_API_KEY:-}
      CLARIFAI_PAT: ${CLARIFAI_PAT:-}
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./workers/image-processor/src:/app/src:ro
    networks:
      - closetx-network

  # AI Advice Service (Python/FastAPI)
  ai-advice-service:
    build:
      context: ./services/ai-advice-service
      dockerfile: Dockerfile
    container_name: closetx-ai-advice-service
    restart: unless-stopped
    ports:
      - "5001:3004"
    environment:
      PORT: 3004
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-closetxuser}:${MONGO_INITDB_ROOT_PASSWORD:-supersecurepassword}@mongodb:27017/closetx_ai?authSource=admin
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_GEMINI_API_KEY: ${GOOGLE_GEMINI_API_KEY:-}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - closetx-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  closetx-network:
    driver: bridge

volumes:
  mongodb-data:
  rabbitmq-data:

apiVersion: v1
kind: ConfigMap
metadata:
  name: closetx-config
  namespace: kates-closetx
data:
  # RabbitMQ connection (using homelab RabbitMQ)
  RABBITMQ_HOST: "rabbitmq.rabbitmq.svc.cluster.local"
  RABBITMQ_USER: "admin"
  
  # Service URLs
  USER_SERVICE_URL: "http://user-service.kates-closetx.svc.cluster.local:3001"
  WARDROBE_SERVICE_URL: "http://wardrobe-service.kates-closetx.svc.cluster.local:3003"
  OUTFIT_SERVICE_URL: "http://outfit-service.kates-closetx.svc.cluster.local:3002"
  AI_SERVICE_URL: "http://ai-advice-service.kates-closetx.svc.cluster.local:3004"
  
  # MongoDB connection
  MONGODB_HOST: "mongodb-service.kates-closetx.svc.cluster.local"
  
  # JWT
  JWT_EXPIRE: "7d"

---
apiVersion: v1
kind: Secret
metadata:
  name: closetx-secrets
  namespace: kates-closetx
type: Opaque
stringData:
  # MongoDB credentials
  MONGODB_ROOT_USERNAME: "closetxuser"
  MONGODB_ROOT_PASSWORD: "supersecurepassword123"
  
  # RabbitMQ password (for homelab RabbitMQ)
  RABBITMQ_PASS: "admin"
  
  # JWT Secret
  JWT_SECRET: "kates-super-secret-jwt-key-minimum-32-characters-long-change-in-production"
  
  # API Keys (optional - leave empty if not using)
  OPENAI_API_KEY: ""
  GEMINI_API_KEY: ""
  OPENWEATHER_API_KEY: ""
  GOOGLE_VISION_API_KEY: ""
  CLARIFAI_API_KEY: ""
